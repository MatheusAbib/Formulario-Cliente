<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${cliente.id != null} ? 'Editar Cliente | Correios' : 'Cadastro de Cliente | Correios'">Cadastro de Cliente | Correios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/Styles.css">
    
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <div class="logo-text">CORREIOS<span>+</span></div>
        </div>
        <div class="user-info">
            <div class="user-avatar">JS</div>
        </div>
    </header>

    <!-- Sidebar -->
    <aside>
        <ul class="sidebar-menu">
            <li>
                <a href="/clientes/add" th:classappend="${cliente.id == null} ? 'active' : ''">
                    <i class="fas fa-user-plus"></i> Cadastre-se
                </a>
            </li>
            <li><a href="/clientes"><i class="fas fa-users"></i> Lista de Usuários</a></li>
            <li><a href="#"><i class="fas fa-cog"></i> Configurações</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main>
        <div class="page-title">
            <h1 th:text="${cliente.id != null} ? 'Editar Cliente' : 'Cadastro de Cliente'">Cadastro de Cliente</h1>
            <div class="badge" th:text="${cliente.id != null} ? 'EDITAR' : 'NOVO'">NOVO</div>
        </div>

        <div class="form-container">
            <div class="paper-clip top"></div>
            <div class="paper-clip left"></div>
            <div class="corner-decoration top-left"></div>
            <div class="corner-decoration top-right"></div>
            <div class="corner-decoration bottom-left"></div>
            <div class="corner-decoration bottom-right"></div>

            <!-- Formulário unificado para cadastro e edição -->
      <form th:action="${cliente.id != null} ? @{/clientes/editar/{id}(id=${cliente.id})} : @{/clientes/add}"
      method="post" 
      th:object="${cliente}"
      id="formCadastro">
                
    <!-- ==================== INFORMAÇÕES PESSOAIS ==================== -->
    <div class="form-section">
        <div class="section-title">Informações Pessoais</div>
        
        <div class="form-row">
            <div class="form-group floating-label-group">
                <input type="text" id="nome" th:field="*{nome}" required placeholder=" ">
                <label class="floating-label" for="nome">Nome Completo</label>
            </div>

            <div class="form-group floating-label-group telefone-field">
                <input type="text" id="telefone" th:field="*{telefone}" required maxlength="15" placeholder=" ">
                <label class="floating-label" for="telefone">Telefone</label>
                <div class="error" id="telefoneError"></div>
            </div>

            <div class="form-group floating-label-group">
                <input type="email" id="email" th:field="*{email}" required placeholder=" ">
                <label class="floating-label" for="email">E-mail</label>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group floating-label-group">
                <input type="date" id="dataNascimento" th:field="*{dataNascimento}" required placeholder=" ">
                <label class="floating-label" for="dataNascimento">Data de Nascimento</label>
            </div>
            
            <div class="form-group floating-label-group cpf-field">
                <input type="text" id="cpf" th:field="*{cpf}" required maxlength="14" placeholder=" ">
                <label class="floating-label" for="cpf">CPF</label>
                <div class="error" id="cpfError"></div>
            </div>

            <div class="form-group floating-label-group custom-select-container">
                <select id="genero" th:field="*{genero}" required>
                    <option value="" disabled selected></option>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Prefiro não dizer">Prefiro não dizer</option>
                </select>
                <label class="floating-label" for="genero">Gênero</label>
            </div>
        </div>
    </div>

    <!-- ==================== SEGURANÇA ==================== -->
    <div class="form-section">
        <div class="section-title">Segurança</div>
        
        <div class="form-row">
            <div class="form-group floating-label-group">
                <input type="password" id="senha" name="senha"
                       th:if="${cliente.id == null}"
                       required autocomplete="new-password" placeholder=" ">
                <label class="floating-label" for="senha">
                    <span th:text="${cliente.id == null} ? 'Senha*' : 'Nova Senha'"></span>
                </label>
                <div class="error" id="senhaError"></div>
            </div>

            <div class="form-group floating-label-group" th:if="${cliente.id == null}">
                <input type="password" id="confirmarSenha" name="confirmarSenha"
                       required placeholder=" ">
                <label class="floating-label" for="confirmarSenha">Confirmar Senha*</label>
                <div class="error" id="confirmarSenhaError"></div>
            </div>
        </div>
    </div>

    <!-- ==================== ENDEREÇO ==================== -->
    <div class="form-section">
        <div class="section-title">Endereço</div>
        
        <div class="form-row">
            <div class="form-group floating-label-group">
                <input type="text" id="tipoResidencia" th:field="*{endereco.tipoResidencia}" required placeholder=" ">
                <label class="floating-label" for="tipoResidencia">Tipo de Residência</label>
            </div>

            <div class="form-group floating-label-group">
                <input type="text" id="logradouro" th:field="*{endereco.logradouro}" required placeholder=" ">
                <label class="floating-label" for="logradouro">Logradouro</label>
            </div>

            <div class="form-group floating-label-group">
                <input type="text" id="numero" th:field="*{endereco.numero}" required placeholder=" ">
                <label class="floating-label" for="numero">Número</label>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group floating-label-group">
                <input type="text" id="bairro" th:field="*{endereco.bairro}" required placeholder=" ">
                <label class="floating-label" for="bairro">Bairro</label>
            </div>

            <div class="form-group floating-label-group">
                <input type="text" id="cep" th:field="*{endereco.cep}" required maxlength="9" placeholder=" ">
                <label class="floating-label" for="cep">CEP</label>
                <div class="error" id="cepError"></div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group floating-label-group">
                <input type="text" id="cidade" th:field="*{endereco.cidade}" required placeholder=" ">
                <label class="floating-label" for="cidade">Cidade</label>
            </div>

            <div class="form-group floating-label-group custom-select-container">
                <select id="estado" th:field="*{endereco.estado}" required>
                    <option value="" disabled selected></option>
                    <option value="SP">São Paulo</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="MG">Minas Gerais</option>
                    <!-- adicione os demais estados -->
                </select>
                <label class="floating-label" for="estado">Estado</label>
            </div>

            <div class="form-group floating-label-group custom-select-container">
                <select id="pais" th:field="*{endereco.pais}" required>
                    <option value="" disabled selected></option>
                    <option value="Brasil">Brasil</option>
                </select>
                <label class="floating-label" for="pais">País</label>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group floating-label-group">
                <input type="text" id="enderecoEntrega" th:field="*{endereco.enderecoEntrega}" required placeholder=" ">
                <label class="floating-label" for="enderecoEntrega">Endereço de Entrega</label>
            </div>

            <div class="form-group floating-label-group">
                <input type="text" id="descricaoEndereco" th:field="*{endereco.descricaoEndereco}" required placeholder=" ">
                <label class="floating-label" for="descricaoEndereco">Descrição do Endereço</label>
            </div>
        </div>
    </div>

    <!-- ==================== PAGAMENTO ==================== -->

<div class="form-section">
    <div class="section-title">Pagamento</div>
    
    <div class="form-row">
        <div class="form-group floating-label-group">
            <input type="text" id="numeroCartao" th:field="*{cartao.numeroCartao}" required maxlength="19" placeholder=" ">
            <label class="floating-label" for="numeroCartao">Número do Cartão</label>
            <div class="error" id="numeroCartaoError"></div>

        </div>

        <div class="form-group floating-label-group">
            <input type="text" id="validade" th:field="*{cartao.validade}" required maxlength="7" placeholder=" ">
            <label class="floating-label" for="validade">Validade (MM/AAAA)</label>
            <div class="error" id="validadeError"></div>

        </div>
    </div>

    <div class="form-row">
        <div class="form-group floating-label-group custom-select-container">
            <select id="bandeira" th:field="*{cartao.bandeira}" required>
                <option value="" disabled selected></option>
                <option value="Visa">Visa</option>
                <option value="Mastercard">Mastercard</option>
                <option value="Elo">Elo</option>
                <option value="Hipercard">Hipercard</option>
                <option value="American Express">American Express</option>
            </select>
            <label class="floating-label" for="bandeira">Bandeira</label>
        </div>

        <div class="form-group floating-label-group cvv-field">
            <input type="text" id="codigoSeguranca" th:field="*{cartao.codigoSeguranca}" required maxlength="3" placeholder=" ">
            <label class="floating-label" for="codigoSeguranca">CVV</label>
        </div>

        <div class="form-group floating-label-group">
            <input type="text" id="nomeCartao" th:field="*{cartao.nomeCartao}" required placeholder=" ">
            <label class="floating-label" for="nomeCartao">Nome no Cartão</label>
        </div>
    </div>
</div>


    <button type="submit" th:text="${cliente.id != null} ? 'Salvar Alterações' : 'Salvar Cadastro'">Salvar Cadastro</button>
</form>

        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-links">
            <a href="#">Listagem</a>
            <a href="#">Política de Privacidade</a>
            <a href="#">Ajuda</a>
            <a href="#">Contato</a>
        </div>
        <div class="copyright">© 2024 <a href="https://matheus-abib-portifolio.up.railway.app/" style="color: #f0f0f0;">Matheus Abib</a>. Todos os direitos reservados.</div>
    </footer>

    <!-- <script src="/js/script.js"></script> -->


<script>
    // Máscaras para os campos
    document.addEventListener('DOMContentLoaded', function() {
        // Máscara para CPF (000.000.000-00)
        const cpfInput = document.getElementById('cpf');
        cpfInput.addEventListener('input', function() {
            let value = this.value.replace(/\D/g, ''); // remove tudo que não é número
            
            // Limita a 11 dígitos
            value = value.substring(0, 11);
            
            // Aplica a formatação: 000.000.000-00
            if (value.length > 9) {
                value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
            } else if (value.length > 6) {
                value = value.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
            } else if (value.length > 3) {
                value = value.replace(/(\d{3})(\d{1,3})/, "$1.$2");
            }
            
            this.value = value;
        });

        // Máscara melhorada para Telefone ((00) 00000-0000 ou (00) 0000-0000)
        const telefoneInput = document.getElementById('telefone');
        telefoneInput.addEventListener('input', function() {
            let value = this.value.replace(/\D/g, '');
            
            if (value.length === 0) {
                this.value = '';
                return;
            }
            
            // Formato: (00) 00000-0000 para celular (11 dígitos)
            // Formato: (00) 0000-0000 para fixo (10 dígitos)
            if (value.length <= 2) {
                this.value = '(' + value;
            } else if (value.length <= 6) {
                this.value = '(' + value.substring(0, 2) + ') ' + value.substring(2);
            } else if (value.length <= 10) {
                this.value = '(' + value.substring(0, 2) + ') ' + value.substring(2, 6) + '-' + value.substring(6);
            } else {
                this.value = '(' + value.substring(0, 2) + ') ' + value.substring(2, 7) + '-' + value.substring(7, 11);
            }
            
            // Limita o tamanho máximo
            this.value = this.value.substring(0, 15);
        });

        // Máscara para CEP (00000-000)
        const cepInput = document.getElementById('cep');
        cepInput.addEventListener('input', function() {
            let value = this.value.replace(/\D/g, '');
            if (value.length > 5) {
                value = value.substring(0, 5) + '-' + value.substring(5);
            }
            this.value = value.substring(0, 9);
        });

        // Máscara para CVV (apenas números, max 3 dígitos)
        const cvvInput = document.getElementById('codigoSeguranca');
        cvvInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').substring(0, 3);
        });

        // Máscara melhorada para Número do Cartão (0000 0000 0000 0000)
        const cartaoInput = document.getElementById('numeroCartao');
        cartaoInput.addEventListener('input', function() {
            let value = this.value.replace(/\D/g, '');
            
            // Adiciona espaços a cada 4 dígitos
            value = value.replace(/(\d{4})(?=\d)/g, '$1 ');
            
            // Limita o tamanho máximo (19 caracteres incluindo espaços)
            this.value = value.substring(0, 19);
            
            // Validação em tempo real
            const digits = value.replace(/\D/g, '');
            if (digits.length > 0 && (digits.length < 13 || digits.length > 19)) {
                document.getElementById('numeroCartaoError').textContent = 'Número inválido (13-19 dígitos)';
                document.getElementById('numeroCartaoError').classList.add('active');
            } else {
                document.getElementById('numeroCartaoError').classList.remove('active');
            }
        });

        // Máscara para Validade do Cartão (MM/AAAA)
        const validadeInput = document.getElementById('validade');
        validadeInput.addEventListener('input', function() {
            let value = this.value.replace(/\D/g, '');
            if (value.length > 2) {
                value = value.substring(0, 2) + '/' + value.substring(2);
            }
            this.value = value.substring(0, 7);
        });

        // Validação em tempo real para validade
        validadeInput.addEventListener('blur', function() {
            const value = this.value;
            const validadeRegex = /^(0[1-9]|1[0-2])\/\d{4}$/;
            
            if (value && !validadeRegex.test(value)) {
                document.getElementById('validadeError').textContent = 'Formato inválido (use MM/AAAA)';
                document.getElementById('validadeError').classList.add('active');
            } else if (value) {
                const [mes, ano] = value.split('/');
                const dataAtual = new Date();
                const dataValidade = new Date(ano, mes - 1);
                
                if (dataValidade < dataAtual) {
                    document.getElementById('validadeError').textContent = 'Cartão expirado';
                    document.getElementById('validadeError').classList.add('active');
                } else {
                    document.getElementById('validadeError').classList.remove('active');
                }
            }
        });

        // Formatação automática para Logradouro (capitalize)
        const logradouroInput = document.getElementById('logradouro');
        logradouroInput.addEventListener('blur', function() {
            this.value = this.value.toLowerCase().replace(/(?:^|\s)\S/g, function(a) {
                return a.toUpperCase();
            });
        });

        // Lista de campos que não podem conter números
        const camposSemNumeros = [
            'nome', 'cidade', 'bairro', 'estado',
            'tipoResidencia', 'bandeira',
            'nomeCartao', 'enderecoEntrega', 'descricaoEndereco'
        ];

        camposSemNumeros.forEach(id => {
            const input = document.getElementById(id);
            if (input) {
                input.addEventListener('input', function() {
                    this.value = this.value.replace(/\d/g, ''); // Remove dígitos
                });
            }
        });

        // Validação de formulário
        document.getElementById('formCadastro').onsubmit = function(event) {
            let isValid = true;
            
            // Validação de CPF (formato)
            if (cpfInput.value.replace(/\D/g, '').length !== 11) {
                document.getElementById('cpfError').textContent = 'CPF deve ter 11 dígitos';
                document.getElementById('cpfError').classList.add('active');
                isValid = false;
            } else {
                document.getElementById('cpfError').classList.remove('active');
            }
            
            // Validação de CEP (formato)
            if (cepInput.value.replace(/\D/g, '').length !== 8) {
                document.getElementById('cepError').textContent = 'CEP deve ter 8 dígitos';
                document.getElementById('cepError').classList.add('active');
                isValid = false;
            } else {
                document.getElementById('cepError').classList.remove('active');
            }
            
            // Validação de telefone (formato)
            const telefoneDigits = telefoneInput.value.replace(/\D/g, '');
            if (telefoneDigits.length < 10 || telefoneDigits.length > 11) {
                document.getElementById('telefoneError').textContent = 'Telefone inválido (deve ter 10 ou 11 dígitos)';
                document.getElementById('telefoneError').classList.add('active');
                isValid = false;
            } else {
                document.getElementById('telefoneError').classList.remove('active');
            }
            
            // Validação de validade (MM/AAAA)
            const validade = validadeInput.value;
            const validadeRegex = /^(0[1-9]|1[0-2])\/\d{4}$/;
            if (!validadeRegex.test(validade)) {
                document.getElementById('validadeError').textContent = 'Validade inválida (formato: MM/AAAA)';
                document.getElementById('validadeError').classList.add('active');
                isValid = false;
            } else {
                document.getElementById('validadeError').classList.remove('active');
            }
            
            // Validação de número do cartão (apenas formato)
            const cartaoDigits = cartaoInput.value.replace(/\D/g, '');
            if (cartaoDigits.length < 13 || cartaoDigits.length > 19) {
                document.getElementById('numeroCartaoError').textContent = 'Número do cartão inválido (13 a 19 dígitos)';
                document.getElementById('numeroCartaoError').classList.add('active');
                isValid = false;
            } else {
                document.getElementById('numeroCartaoError').classList.remove('active');
            }
            
            // Validação de senha apenas para novo cadastro
            if (document.getElementById('confirmarSenha')) {
                const senha = document.getElementById('senha').value;
                const confirmarSenha = document.getElementById('confirmarSenha').value;
                
                if (senha.length < 6) {
                    document.getElementById('senhaError').textContent = 'Senha deve ter pelo menos 6 caracteres';
                    document.getElementById('senhaError').classList.add('active');
                    isValid = false;
                } else {
                    document.getElementById('senhaError').classList.remove('active');
                }
                
                // MENSAGEM DE ERRO DE SENHAS NÃO COINCIDIREM
                if (senha !== confirmarSenha) {
                    document.getElementById('confirmarSenhaError').textContent = 'As senhas não coincidem';
                    document.getElementById('confirmarSenhaError').classList.add('active');
                    isValid = false;
                } else {
                    document.getElementById('confirmarSenhaError').classList.remove('active');
                }
            }
            
            if (!isValid) {
                event.preventDefault();
                // Rola para o primeiro erro
                const firstError = document.querySelector('.error.active');
                if (firstError) {
                    firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        };
    });

    // Animação para os campos com máscara quando completos
    function animateField(field) {
        field.style.transform = 'scale(1.02)';
        field.style.boxShadow = '0 0 0 2px rgba(0, 179, 60, 0.3)';
        setTimeout(() => {
            field.style.transform = '';
            field.style.boxShadow = '';
        }, 300);
    }
</script>
</body>
</html>
